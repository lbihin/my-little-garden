name: CD

on:
  push:
    branches: [main]

# Un seul déploiement à la fois
concurrency:
  group: production
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────
  # 1. CI complète avant déploiement
  # ─────────────────────────────────────────
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  # ─────────────────────────────────────────
  # 2. Build de l'image / artefact
  # ─────────────────────────────────────────
  build:
    name: Build
    needs: ci
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Check Tailwind input exists
        id: tailwind_input
        run: |
          if [ -f app/static/tw/tailwind-input.css ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.tailwind_input.outputs.exists == 'true'
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        if: steps.tailwind_input.outputs.exists == 'true'
        run: npm ci

      - name: Build Tailwind CSS
        if: steps.tailwind_input.outputs.exists == 'true'
        run: npm run build

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: uv sync --no-group dev

      - name: Collect static files
        working-directory: app
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: "0"
        run: uv run python manage.py collectstatic --no-input

      - name: Upload artefact de déploiement
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package
          path: |
            app/
            staticfiles/
            pyproject.toml
            uv.lock
          retention-days: 1

  # ─────────────────────────────────────────
  # 3. Déploiement
  # Adapter selon la cible d'hébergement :
  #   - VPS / SSH  → décommentez la section SSH
  #   - Fly.io     → décommentez la section Fly
  #   - Railway    → décommentez la section Railway
  # ─────────────────────────────────────────
  deploy:
    name: Deploy
    needs: build
    runs-on: self-hosted
    environment: production
    steps:
      - name: Download artefact
        uses: actions/download-artifact@v4
        with:
          name: deploy-package

      # ── Option A : VPS via SSH ────────────────────────────────────────
      # Secrets requis : SSH_HOST, SSH_USER, SSH_PRIVATE_KEY, SECRET_KEY
      #
      # - name: Deploy via SSH
      #   uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.SSH_HOST }}
      #     username: ${{ secrets.SSH_USER }}
      #     key: ${{ secrets.SSH_PRIVATE_KEY }}
      #     script: |
      #       cd /srv/my_little_garden
      #       git pull origin main
      #       uv sync --no-group dev
      #       uv run python app/manage.py migrate --no-input
      #       uv run python app/manage.py collectstatic --no-input
      #       sudo systemctl restart gunicorn

      # ── Option B : Fly.io ─────────────────────────────────────────────
      # Secrets requis : FLY_API_TOKEN
      #
      # - name: Deploy to Fly.io
      #   uses: superfly/flyctl-actions/setup-flyctl@master
      # - run: flyctl deploy --remote-only
      #   env:
      #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # ── Option C : Railway ────────────────────────────────────────────
      # Secrets requis : RAILWAY_TOKEN
      #
      # - name: Deploy to Railway
      #   uses: bervProject/railway-deploy@v1
      #   with:
      #     railway_token: ${{ secrets.RAILWAY_TOKEN }}
      #     service: my-little-garden

      # Placeholder actif – retirer quand une option ci-dessus est activée
      - name: Déploiement non configuré
        run: |
          echo "⚠️  Déploiement non encore configuré."
          echo "Décommentez l'option souhaitée dans .github/workflows/cd.yml"
          echo "et ajoutez les secrets correspondants dans les Settings du dépôt."
