<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#E0F0FF"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5DAE3B"/>
      <stop offset="100%" stop-color="#3D8B25"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="400" height="200" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="340" cy="40" r="25" fill="#FFD93D" opacity="0.9"/>
  <!-- Clouds -->
  <g fill="white" opacity="0.7">
    <ellipse cx="80" cy="45" rx="30" ry="14"/>
    <ellipse cx="105" cy="40" rx="22" ry="12"/>
    <ellipse cx="60" cy="40" rx="18" ry="10"/>
    <ellipse cx="220" cy="30" rx="26" ry="12"/>
    <ellipse cx="245" cy="26" rx="20" ry="10"/>
  </g>
  <!-- Hills -->
  <ellipse cx="100" cy="140" rx="150" ry="50" fill="#6BBF4A" opacity="0.5"/>
  <ellipse cx="320" cy="145" rx="130" ry="45" fill="#6BBF4A" opacity="0.4"/>
  <!-- Ground -->
  <rect x="0" y="140" width="400" height="60" fill="url(#grass)"/>
  <!-- Fence -->
  <g stroke="#8B7355" stroke-width="2" fill="#A0885A">
    <rect x="30" y="115" width="6" height="35" rx="1"/>
    <rect x="60" y="115" width="6" height="35" rx="1"/>
    <rect x="90" y="115" width="6" height="35" rx="1"/>
    <rect x="120" y="115" width="6" height="35" rx="1"/>
    <line x1="30" y1="125" x2="126" y2="125" stroke-width="3"/>
    <line x1="30" y1="138" x2="126" y2="138" stroke-width="3"/>
  </g>
  <!-- Tree -->
  <rect x="175" y="95" width="10" height="50" fill="#8B6914" rx="2"/>
  <ellipse cx="180" cy="80" rx="30" ry="28" fill="#2E8B2E"/>
  <ellipse cx="170" cy="90" rx="22" ry="20" fill="#3AA03A"/>
  <ellipse cx="192" cy="88" rx="20" ry="18" fill="#349634"/>
  <!-- Flowers -->
  <g>
    <!-- Flower 1 -->
    <line x1="260" y1="140" x2="260" y2="118" stroke="#228B22" stroke-width="2"/>
    <circle cx="260" cy="115" r="5" fill="#FF6B8A"/>
    <circle cx="260" cy="115" r="2" fill="#FFD700"/>
    <!-- Flower 2 -->
    <line x1="280" y1="140" x2="280" y2="122" stroke="#228B22" stroke-width="2"/>
    <circle cx="280" cy="119" r="4.5" fill="#FF85A2"/>
    <circle cx="280" cy="119" r="2" fill="#FFD700"/>
    <!-- Flower 3 -->
    <line x1="300" y1="140" x2="300" y2="116" stroke="#228B22" stroke-width="2"/>
    <circle cx="300" cy="113" r="5" fill="#DA70D6"/>
    <circle cx="300" cy="113" r="2" fill="#FFD700"/>
    <!-- Flower 4 -->
    <line x1="320" y1="140" x2="320" y2="120" stroke="#228B22" stroke-width="2"/>
    <circle cx="320" cy="117" r="4" fill="#FF6B8A"/>
    <circle cx="320" cy="117" r="1.5" fill="#FFD700"/>
  </g>
  <!-- Watering can -->
  <g transform="translate(350, 130) scale(0.6)">
    <ellipse cx="20" cy="20" rx="18" ry="12" fill="#708090"/>
    <rect x="5" y="8" width="30" height="14" rx="3" fill="#708090"/>
    <line x1="35" y1="10" x2="50" y2="2" stroke="#708090" stroke-width="3" stroke-linecap="round"/>
    <circle cx="52" cy="0" r="5" fill="none" stroke="#708090" stroke-width="2"/>
  </g>
  <!-- Text -->
  <text x="200" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="white" opacity="0.8" font-weight="bold">🌿 Mon Jardin</text>
</svg>
