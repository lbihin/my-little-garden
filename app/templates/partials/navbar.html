<ul class="menu menu-horizontal px-1 gap-1">
  {% if user.is_authenticated %}
    <li>
      <a href="{% url 'gardens:list' %}" class="btn btn-ghost btn-sm">🌳 Jardins</a>
    </li>
    <li>
      <div class="dropdown dropdown-end">
        <div tabindex="0" role="button" class="btn btn-ghost btn-sm gap-1">
          <span class="text-sm">👤</span>
          <span>{{ user.username }}</span>
          <svg class="h-3 w-3 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </div>
        <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box z-50 w-52 p-2 shadow-lg mt-2">
          <li class="menu-title text-xs">{{ user.email|default:'Mon compte' }}</li>
          <li><a href="{% url 'accounts:logout' %}">🚪 Déconnexion</a></li>
        </ul>
      </div>
    </li>
  {% else %}
    <li>
      <a href="{% url 'accounts:login' %}" class="btn btn-ghost btn-sm">Connexion</a>
    </li>
    <li>
      <a href="{% url 'accounts:register' %}" class="btn btn-primary btn-sm">Inscription</a>
    </li>
  {% endif %}
</ul>
