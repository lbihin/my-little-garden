<div class="flex items-center gap-1">
  {% if user.is_authenticated %}
    <a href="{% url 'gardens:list' %}" class="btn btn-ghost btn-sm gap-1.5">
      <i data-lucide="layout-grid" class="w-4 h-4"></i>
      <span>Jardins</span>
    </a>
    <div class="dropdown dropdown-end">
      <div tabindex="0" role="button" class="btn btn-ghost btn-sm gap-1.5">
        <i data-lucide="user-round" class="w-4 h-4"></i>
        <span class="hidden sm:inline">{{ user.username }}</span>
        <i data-lucide="chevron-down" class="w-3 h-3 opacity-50"></i>
      </div>
      <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-xl z-50 w-52 p-1.5 shadow-lg border border-base-200 mt-1">
        <li class="px-3 py-1.5">
          <span class="text-xs text-base-content/50 font-medium">{{ user.email|default:user.username }}</span>
        </li>
        <div class="divider my-0.5"></div>
        <li>
          <a href="{% url 'accounts:logout' %}" class="gap-2">
            <i data-lucide="log-out" class="w-4 h-4 text-error/70"></i>
            <span>Déconnexion</span>
          </a>
        </li>
      </ul>
    </div>
  {% else %}
    <a href="{% url 'accounts:login' %}" class="btn btn-ghost btn-sm">Connexion</a>
    <a href="{% url 'accounts:register' %}" class="btn btn-primary btn-sm">Inscription</a>
  {% endif %}
</div>
