{% extends "base.html" %}

{% block title %}Supprimer {{ garden.name }} — My Little Garden{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-lg">
    <div class="card bg-base-100 shadow-xl">
        <div class="card-body text-center">
            <h2 class="card-title text-2xl justify-center mb-2">Supprimer le jardin</h2>
            <p class="mb-6">
                Êtes-vous sûr de vouloir supprimer <strong>{{ garden.name }}</strong> ?
                <br>
                <span class="text-sm opacity-60">Cette action est irréversible.</span>
            </p>
            <form method="post">
                {% csrf_token %}
                <div class="flex justify-center gap-3">
                    <a href="{% url 'gardens:detail' garden.slug %}" class="btn btn-ghost">Annuler</a>
                    <button type="submit" class="btn btn-error">Supprimer</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
